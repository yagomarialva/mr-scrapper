services:
  # ── PostgreSQL Database ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: mrscrap_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mrscrap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mrscrap_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-mrscrap_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mrscrap} -d ${POSTGRES_DB:-mrscrap_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mrscrap_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-mrscrap}:${POSTGRES_PASSWORD:-mrscrap_secret_2024}@db:5432/${POSTGRES_DB:-mrscrap_db}
      - MEDIA_PATH=/app/media

  # ── Angular Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mrscrap_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"
  # ── Telegram Bot ─────────────────────────────────────────────
  # bot:
  #   build:
  #     context: ./bot
  #     dockerfile: Dockerfile
  #   container_name: mrscrap_bot
  #   restart: unless-stopped
  #   depends_on:
  #     - backend
  #   env_file:
  #     - .env
  #   environment:
  #     - BACKEND_URL=http://backend:8000

  # ── Volumes Globais (Raiz do documento) ────────────────────────
volumes:
  postgres_data:
    driver: local
  media_data:
    driver: local
